version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: coincart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coincart
      POSTGRES_PASSWORD: coincart
      POSTGRES_DB: coincart
    ports:
      - "5432:5432"
    volumes:
      - coincart_pg_data:/var/lib/postgresql/data

volumes:
  coincart_pg_data: